{% extends "base.html" %}
{% block title %}Courses{% endblock %}
{% block content %}
<div class="page-header"><h1>Course Management</h1><p>All active courses</p></div>
<div class="card">
  <div class="card-header">📚 Courses ({{ courses|length }})</div>
  <table>
    <tr><th>Code</th><th>Course Name</th><th>Credits</th><th>Status</th></tr>
    {% for c in courses %}
    <tr>
      <td><strong>{{ c.code }}</strong></td>
      <td>{{ c.name }}</td>
      <td>{{ c.credits }}</td>
      <td><span class="badge badge-green">Active</span></td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
