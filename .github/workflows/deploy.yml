name: Deploy College ERP to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 238391222280.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: college-erp
  IMAGE_TAG: latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Step 3: Login to ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin 238391222280.dkr.ecr.us-east-1.amazonaws.com

      # Step 4: Build & Push Image
      - name: Build, Tag & Push Docker Image
        run: |
          echo "Building image..."
          docker build -t college-erp .

          echo "Tagging image..."
          docker tag college-erp:latest 238391222280.dkr.ecr.us-east-1.amazonaws.com/college-erp:latest

          echo "Pushing image..."
          docker push 238391222280.dkr.ecr.us-east-1.amazonaws.com/college-erp:latest

          echo "IMAGE=238391222280.dkr.ecr.us-east-1.amazonaws.com/college-erp:latest" >> $GITHUB_ENV

      # Step 5: Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE
          script: |
            echo "Login to ECR..."
            aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin 238391222280.dkr.ecr.us-east-1.amazonaws.com

            echo "Pull image..."
            docker pull $IMAGE

            echo "Remove old container..."
            docker stop college-erp-app 2>/dev/null || true
            docker rm college-erp-app 2>/dev/null || true

            echo "Run container..."
            docker run -d \
              --name college-erp-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              $IMAGE

            echo "Deployment done"

      # Step 6: Health Check
      - name: Health Check
        run: |
          echo "Waiting 20s..."
          sleep 20

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}:5000/health)

          if [ "$STATUS" = "200" ]; then
            echo "App is healthy"
          else
            echo "Health check failed"
            exit 1
          fi