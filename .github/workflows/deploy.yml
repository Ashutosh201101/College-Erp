name: Deploy College ERP to AWS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: college-erp
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ Fix warning

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout code ──────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Step 2: Configure AWS credentials ─────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Step 3: Login to Amazon ECR ───────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Step 4: Build, tag and push Docker image ──────────
      - name: Build, Tag & Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Building Docker image..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

          echo "Tagging image..."
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                     $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "Pushing image to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      # ── Step 5: Deploy to EC2 ─────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ec2-user
          key:         ${{ secrets.EC2_SSH_KEY }}
          envs:        IMAGE
          script: |
            echo "Logging into ECR..."
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin \
              238391222280.dkr.ecr.us-east-1.amazonaws.com

            echo "Pulling latest image..."
            docker pull $IMAGE

            echo "Stopping old container..."
            docker stop college-erp-app 2>/dev/null || true
            docker rm college-erp-app 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name college-erp-app \
              --restart unless-stopped \
              -p 5000:5000 \
              -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
              $IMAGE

            echo "Deployment complete 🚀"

      # ── Step 6: Health Check ──────────────────────────────
      - name: ALB Health Check
        run: |
          echo "Waiting 20s for app to start..."
          sleep 20

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.ALB_DNS }}/health)

          if [ "$STATUS" = "200" ]; then
            echo "Health check passed ✅"
          else
            echo "Health check failed ❌ (Status: $STATUS)"
            exit 1
          fi